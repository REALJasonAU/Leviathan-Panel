<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Continuing in terminal</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Geist, "SF Pro Display", "Segoe UI", sans-serif;
        background: #05070d;
        color: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at top left,
            rgba(0, 212, 255, 0.12),
            transparent 24%
          ),
          radial-gradient(
            circle at top right,
            rgba(124, 58, 237, 0.12),
            transparent 26%
          ),
          linear-gradient(180deg, #05070d 0%, #060a12 100%);
      }

      .card {
        padding: 28px 32px;
        border-radius: 24px;
        border: 1px solid rgba(51, 65, 85, 0.7);
        background: rgba(17, 24, 39, 0.82);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.28);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #00d4ff;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: #94a3b8;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="eyebrow">Leviathan</p>
      <h1>Continuing in terminal</h1>
      <p>
        The visual direction is locked. Next step: design system and page
        architecture.
      </p>
    </div>
  </body>
</html>
